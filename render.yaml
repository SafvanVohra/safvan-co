services:
  - type: web
    name: vohra-ca-api
    env: node
    plan: free
    rootDir: server
    branch: main
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: https://safvan-co.vercel.app
      - key: MONGODB_URI
        sync: false
